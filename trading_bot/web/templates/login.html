<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход — Trading Bot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #1a1d27; border: 1px solid #2d3748; border-radius: 10px; padding: 2.5rem; width: 360px; }
        h1 { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
        p { color: #718096; font-size: 0.875rem; margin-bottom: 2rem; }
        label { display: block; font-size: 0.8rem; color: #a0aec0; margin-bottom: 0.35rem; }
        input { width: 100%; background: #161820; border: 1px solid #2d3748; color: #e2e8f0; border-radius: 6px; padding: 0.6rem 0.85rem; font-size: 0.9rem; margin-bottom: 1.25rem; }
        input:focus { outline: none; border-color: #4299e1; }
        button { width: 100%; background: #4299e1; color: #fff; border: none; border-radius: 6px; padding: 0.65rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
        button:hover { background: #3182ce; }
        .error { background: #3a1a1a; border: 1px solid #e53e3e; color: #fc8181; border-radius: 6px; padding: 0.6rem 0.85rem; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Trading Bot</h1>
        <p>Войдите для доступа к дашборду</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <label>Логин</label>
            <input type="text" name="username" autofocus required>
            <label>Пароль</label>
            <input type="password" name="password" required>
            <button type="submit">Войти</button>
        </form>
    </div>
</body>
</html>
