{% extends "base.html" %}
{% block title %}RSI-тест — Trading Bot{% endblock %}

{% block content %}
<div style="display: flex; gap: 1.5rem; height: calc(100vh - 56px - 4rem); min-height: 500px;">

    <!-- Список тикеров -->
    <div style="width: 160px; flex-shrink: 0;">
        <div class="card" style="padding: 0; overflow: hidden; height: 100%;">
            <div style="padding: 0.75rem 1rem; border-bottom: 1px solid #2d3748; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #718096;">
                Тикеры
            </div>
            <div style="overflow-y: auto; height: calc(100% - 40px);">
                {% for t in tickers %}
                <div class="ticker-item {{ 'active' if t == selected }}"
                     data-ticker="{{ t }}"
                     style="padding: 0.65rem 1rem; cursor: pointer; font-size: 0.9rem; font-weight: {{ '600' if t == selected else '400' }}; color: {{ '#fff' if t == selected else '#a0aec0' }}; background: {{ '#1e2233' if t == selected else 'transparent' }}; border-left: 3px solid {{ '#4299e1' if t == selected else 'transparent' }};">
                    {{ t }}
                </div>
                {% endfor %}
            </div>
        </div>
    </div>

    <!-- Основная область -->
    <div style="flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1rem;">

        <!-- Заголовок и параметры -->
        <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;">
            <h1 class="page-title" style="margin-bottom: 0;" id="chart-title">RSI-тест — {{ selected }}</h1>
            <div style="display: flex; gap: 0.5rem; align-items: center; margin-left: auto;">
                <label style="font-size: 0.8rem;">Дней:</label>
                <select id="days-select" style="width: 80px;" onchange="loadChart()">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                    <option value="30">30</option>
                </select>
                <label style="font-size: 0.8rem;">Свечей:</label>
                <select id="display-select" style="width: 90px;" onchange="loadChart()">
                    <option value="100">100</option>
                    <option value="200" selected>200</option>
                    <option value="300">300</option>
                    <option value="500">500</option>
                </select>
            </div>
        </div>

        <!-- ATR и параметры -->
        <div id="info-panel" style="display: none; gap: 0.75rem; flex-wrap: wrap;"></div>

        <!-- График RSI -->
        <div class="card" style="flex: 1; min-height: 300px; position: relative;">
            <div id="loading" style="position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #718096; font-size: 0.9rem;">
                Загрузка...
            </div>
            <div id="error-msg" style="display: none; position: absolute; inset: 0; align-items: center; justify-content: center; color: #fc8181; font-size: 0.9rem;"></div>
            <canvas id="rsi-chart" style="display: none; width: 100%; height: 100%;"></canvas>
        </div>

        <!-- Таблица сигналов -->
        <div class="card" style="max-height: 200px; overflow-y: auto;">
            <div style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #718096; margin-bottom: 0.75rem;">
                Сигналы входа (пересечения OB/OS)
            </div>
            <div id="signals-table-wrap">
                <span style="color: #718096; font-size: 0.85rem;">—</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let chartInstance = null;
let currentTicker = "{{ selected }}";

document.querySelectorAll('.ticker-item').forEach(el => {
    el.addEventListener('click', () => {
        document.querySelectorAll('.ticker-item').forEach(x => {
            x.style.fontWeight = '400';
            x.style.color = '#a0aec0';
            x.style.background = 'transparent';
            x.style.borderLeftColor = 'transparent';
        });
        el.style.fontWeight = '600';
        el.style.color = '#fff';
        el.style.background = '#1e2233';
        el.style.borderLeftColor = '#4299e1';
        currentTicker = el.dataset.ticker;
        document.getElementById('chart-title').textContent = 'RSI-тест — ' + currentTicker;
        loadChart();
    });
});

function loadChart() {
    const days = document.getElementById('days-select').value;
    const display = document.getElementById('display-select').value;

    document.getElementById('loading').style.display = 'flex';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('rsi-chart').style.display = 'none';
    document.getElementById('info-panel').style.display = 'none';
    document.getElementById('signals-table-wrap').innerHTML = '<span style="color: #718096; font-size: 0.85rem;">Загрузка...</span>';

    fetch(`/api/rsi-test/${currentTicker}?days=${days}&display=${display}`)
        .then(r => r.json())
        .then(data => {
            if (data.error) {
                document.getElementById('loading').style.display = 'none';
                const em = document.getElementById('error-msg');
                em.textContent = data.error;
                em.style.display = 'flex';
                return;
            }
            renderChart(data);
            renderInfoPanel(data);
            renderSignalsTable(data);
        })
        .catch(err => {
            document.getElementById('loading').style.display = 'none';
            const em = document.getElementById('error-msg');
            em.textContent = 'Ошибка запроса: ' + err;
            em.style.display = 'flex';
        });
}

function renderChart(data) {
    document.getElementById('loading').style.display = 'none';
    const canvas = document.getElementById('rsi-chart');
    canvas.style.display = 'block';

    const labels = data.timestamps.map(t => {
        const d = new Date(t);
        return d.toLocaleString('ru', {month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit'});
    });

    // Сигналы: массив точек для scatter
    const longSignals = data.signals
        .filter(s => s.type === 'long')
        .map(s => ({x: labels[s.idx], y: s.arsi}));
    const shortSignals = data.signals
        .filter(s => s.type === 'short')
        .map(s => ({x: labels[s.idx], y: s.arsi}));

    // Горизонтальные линии OB/OS через plugin annotation или просто datasets
    const obLine = data.timestamps.map(() => data.ob);
    const osLine = data.timestamps.map(() => data.os);

    if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
    }

    chartInstance = new Chart(canvas, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                {
                    label: 'ARSI',
                    data: data.arsi,
                    borderColor: '#4299e1',
                    borderWidth: 1.5,
                    pointRadius: 0,
                    tension: 0.1,
                    fill: false,
                    order: 1,
                },
                {
                    label: 'Signal',
                    data: data.signal_line,
                    borderColor: '#f6ad55',
                    borderWidth: 1.5,
                    borderDash: [4, 2],
                    pointRadius: 0,
                    tension: 0.1,
                    fill: false,
                    order: 2,
                },
                {
                    label: `OB ${data.ob}`,
                    data: obLine,
                    borderColor: 'rgba(252,129,129,0.5)',
                    borderWidth: 1,
                    borderDash: [6, 3],
                    pointRadius: 0,
                    fill: false,
                    order: 3,
                },
                {
                    label: `OS ${data.os}`,
                    data: osLine,
                    borderColor: 'rgba(104,211,145,0.5)',
                    borderWidth: 1,
                    borderDash: [6, 3],
                    pointRadius: 0,
                    fill: false,
                    order: 4,
                },
                {
                    label: 'LONG',
                    type: 'scatter',
                    data: longSignals,
                    backgroundColor: '#68d391',
                    pointStyle: 'triangle',
                    pointRadius: 8,
                    order: 0,
                },
                {
                    label: 'SHORT',
                    type: 'scatter',
                    data: shortSignals,
                    backgroundColor: '#fc8181',
                    pointStyle: 'triangle',
                    rotation: 180,
                    pointRadius: 8,
                    order: 0,
                },
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            interaction: {
                mode: 'index',
                intersect: false,
            },
            plugins: {
                legend: {
                    labels: { color: '#a0aec0', font: {size: 11} }
                },
                tooltip: {
                    backgroundColor: '#1a1d27',
                    borderColor: '#2d3748',
                    borderWidth: 1,
                    titleColor: '#e2e8f0',
                    bodyColor: '#a0aec0',
                }
            },
            scales: {
                x: {
                    ticks: {
                        color: '#718096',
                        font: {size: 10},
                        maxTicksLimit: 20,
                        maxRotation: 45,
                    },
                    grid: { color: '#1e2233' },
                },
                y: {
                    min: 0,
                    max: 100,
                    ticks: { color: '#718096', font: {size: 11} },
                    grid: { color: '#1e2233' },
                }
            }
        }
    });
}

function renderInfoPanel(data) {
    const panel = document.getElementById('info-panel');
    const items = [];

    // Последнее значение ARSI
    const lastArsi = data.arsi.filter(v => v !== null).slice(-1)[0];
    const lastSignal = data.signal_line.filter(v => v !== null).slice(-1)[0];
    if (lastArsi !== undefined) {
        const zoneColor = lastArsi >= data.ob ? '#fc8181' : lastArsi <= data.os ? '#68d391' : '#a0aec0';
        items.push(`<div class="card" style="padding: 0.6rem 0.9rem; flex: none;">
            <div class="card-title">ARSI</div>
            <div style="font-size: 1.3rem; font-weight: 700; color: ${zoneColor};">${lastArsi.toFixed(1)}</div>
        </div>`);
    }
    if (lastSignal !== undefined) {
        items.push(`<div class="card" style="padding: 0.6rem 0.9rem; flex: none;">
            <div class="card-title">Signal Line</div>
            <div style="font-size: 1.3rem; font-weight: 700; color: #f6ad55;">${lastSignal.toFixed(1)}</div>
        </div>`);
    }

    items.push(`<div class="card" style="padding: 0.6rem 0.9rem; flex: none;">
        <div class="card-title">Сигналов за период</div>
        <div style="font-size: 1.3rem; font-weight: 700; color: #fff;">${data.signals.length}</div>
    </div>`);

    items.push(`<div class="card" style="padding: 0.6rem 0.9rem; flex: none;">
        <div class="card-title">Свечей загружено</div>
        <div style="font-size: 1.1rem; font-weight: 600; color: #a0aec0;">${data.candles_total} (показ. ${data.display_count})</div>
    </div>`);

    if (data.atr) {
        const a = data.atr;
        const color = a.ok ? '#68d391' : '#fc8181';
        items.push(`<div class="card" style="padding: 0.6rem 0.9rem; flex: none;">
            <div class="card-title">ATR-фильтр</div>
            <div style="font-size: 1rem; font-weight: 700; color: ${color};">${a.ok ? 'OK' : 'БЛОК'}</div>
            <div style="font-size: 0.75rem; color: #718096;">ratio ${a.ratio} / min ${a.ratio_min}</div>
        </div>`);
    }

    panel.innerHTML = items.join('');
    panel.style.display = 'flex';
}

function renderSignalsTable(data) {
    const wrap = document.getElementById('signals-table-wrap');
    if (!data.signals.length) {
        wrap.innerHTML = '<span style="color: #718096; font-size: 0.85rem;">Нет сигналов за выбранный период</span>';
        return;
    }

    const rows = data.signals.slice().reverse().map(s => {
        const badge = s.type === 'long'
            ? '<span class="badge badge-long">LONG</span>'
            : '<span class="badge badge-short">SHORT</span>';
        const d = new Date(s.ts);
        const ts = d.toLocaleString('ru', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
        return `<tr><td>${badge}</td><td>${ts}</td><td style="font-weight:600;color:#4299e1;">${s.arsi.toFixed(1)}</td></tr>`;
    }).join('');

    wrap.innerHTML = `<table>
        <thead><tr><th>Тип</th><th>Время</th><th>ARSI</th></tr></thead>
        <tbody>${rows}</tbody>
    </table>`;
}

// Загрузить при старте
loadChart();
</script>
{% endblock %}
