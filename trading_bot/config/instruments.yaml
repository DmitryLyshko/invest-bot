SBER:
  figi: "BBG004730N88"
  lot_size: 10
  # Порог OFI для генерации сигнала. Значение от 0 до 1.
  # 0.6 означает: дисбаланс должен составлять минимум 60% в сторону покупок или продаж
  ofi_threshold: 0.6
  # Мультипликатор для определения крупного принта
  # Объём сделки считается крупным, если он >= медиана * print_multiplier
  print_multiplier: 7.0
  # Размер скользящего окна для расчёта медианы объёмов
  print_window: 200
  # Количество уровней стакана для расчёта OFI (топ N уровней)
  ofi_levels: 5
  # Минимальный интервал между сигналами (секунды)
  cooldown_seconds: 60
  # Максимальное время удержания позиции (минуты)
  max_hold_minutes: 60
  # Стоп-лосс в тиках (единицах минимального шага цены)
  stop_ticks: 3
  # Максимальный размер позиции в лотах
  max_position_lots: 1
  trading_hours:
    start: "10:05"
    end: "18:30"
  # Пропускать сигналы первые N минут после открытия рынка (высокая волатильность открытия)
  skip_first_minutes: 5

