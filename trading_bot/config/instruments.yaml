  lot_size: 10
  commission_rate: 0.0004
  ofi_threshold: 0.75
  print_multiplier: 8.0
  print_window: 200
  ofi_levels: 5
  cooldown_seconds: 90
  post_close_cooldown_seconds: 120
  max_hold_minutes: 60
  # tick=0.02 руб, stop=10 тиков = 0.20 руб/акция (~0.15% от 135.74)
  tick_size: 0.02
  stop_ticks: 10
  breakeven_ticks: 8
  max_position_lots: 1
  # take_profit 1:3 (10×3=30)
  take_profit_ticks: 30
  trading_hours:
    start: "10:05"
    end: "18:30"
  skip_first_minutes: 5
  ofi_smooth_window: 12
  min_hold_seconds: 120
  ofi_exit_threshold: 0.5
  min_ofi_confirmations: 4
  # Комиссия ~5 тиков (135.74×0.08% / 0.02), порог чуть выше.
  # При убытке (profit_ticks ≤ 0) — OFI-выход всегда разрешён.
  # 0 = отключено.
  min_profit_ticks_for_ofi_exit: 7

