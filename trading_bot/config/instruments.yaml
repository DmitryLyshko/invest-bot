SBER:
  figi: "BBG004730N88"
  instrument_id: "e6123145-9665-43e0-8413-cd61b8aa9b13"
  lot_size: 10
  # Комиссия брокера за одну сторону (T-Invest тариф Трейдер)
  commission_rate: 0.0004
  # Порог OFI для генерации сигнала. Значение от 0 до 1.
  # 0.6 означает: дисбаланс должен составлять минимум 60% в сторону покупок или продаж
  ofi_threshold: 0.75
  # Мультипликатор для определения крупного принта
  # Объём сделки считается крупным, если он >= медиана * print_multiplier
  print_multiplier: 10.0
  # Размер скользящего окна для расчёта медианы объёмов
  print_window: 200
  # Количество уровней стакана для расчёта OFI (топ N уровней)
  ofi_levels: 5
  # Минимальный интервал между сигналами (секунды)
  cooldown_seconds: 60
  # Кулдаун после закрытия позиции (секунды).
  # Предотвращает мгновенный флип: шорт закрылся по OFI → сразу лонг.
  # OFI-разворот на выходе часто ложный, нужно подождать стабилизации.
  post_close_cooldown_seconds: 90
  # Максимальное время удержания позиции (минуты)
  max_hold_minutes: 60
  # Минимальный шаг цены
  tick_size: 0.01
  # Стоп-лосс в тиках (единицах минимального шага цены)
  stop_ticks: 40
  # Перенос стопа в безубыток: после движения на N тиков в нашу сторону
  # стоп переносится на цену входа (худший итог = -комиссия)
  breakeven_ticks: 35
  # Максимальный размер позиции в лотах
  max_position_lots: 1
  # Тейк-профит в тиках (0 = отключён). Соотношение к стопу 1:3 (40 × 3 = 120)
  take_profit_ticks: 120
  trading_hours:
    start: "10:05"
    end: "18:30"
  # Пропускать сигналы первые N минут после открытия рынка (высокая волатильность открытия)
  skip_first_minutes: 5

  # --- ПАРАМЕТРЫ СТАБИЛИЗАЦИИ ВЫХОДА ---

  # Количество последних снимков стакана для сглаживания OFI.
  # Стакан SBER обновляется ~5-10 раз/сек, поэтому 15 снимков = ~2-3 секунды.
  # Сглаживание убирает краткосрочные флипы OFI вызванные шумом стакана.
  ofi_smooth_window: 12

  # Минимальное время удержания позиции в секундах.
  # Позиция НЕ может быть закрыта раньше этого времени ни при каком OFI.
  # Защищает от мгновенного закрытия сразу после открытия.
  min_hold_seconds: 120

  # Порог OFI для выхода из позиции.
  # Ближе к порогу входа — выход только при устойчивом развороте.
  ofi_exit_threshold: 0.5

  # Сколько раз подряд OFI должен быть против позиции чтобы закрыть её.
  # Защита от случайных кратковременных флипов стакана.
  # При значении 4 — OFI должен быть против позиции на 4 последовательных
  # апдейтах стакана, прежде чем выйти.
  min_ofi_confirmations: 4

  # Минимальная прибыль в тиках для разрешения выхода по OFI-развороту.
  # Блокирует OFI-выход если прибыль > 0 но меньше порога:
  # выход при маленьком плюсе гарантирует убыток после комиссии.
  # Комиссия SBER ~25.5 тиков (319 × 10 × 0.08%), порог чуть выше.
  # При убытке (profit_ticks ≤ 0) — OFI-выход всегда разрешён.
  # 0 = отключено.
  min_profit_ticks_for_ofi_exit: 28

