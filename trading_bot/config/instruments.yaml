SBER:
  figi: "BBG004730N88"
  instrument_id: "e6123145-9665-43e0-8413-cd61b8aa9b13"
  lot_size: 10
  commission_rate: 0.0004
  ofi_threshold: 0.75
  print_multiplier: 10.0
  print_window: 200
  ofi_levels: 5
  cooldown_seconds: 60
  post_close_cooldown_seconds: 90
  max_hold_minutes: 60
  tick_size: 0.01
  stop_ticks: 40
  breakeven_ticks: 35
  max_position_lots: 1
  take_profit_ticks: 120
  trading_hours:
    start: "10:05"
    end: "18:30"
  skip_first_minutes: 5
  ofi_smooth_window: 12
  min_hold_seconds: 120
  ofi_exit_threshold: 0.5
  min_ofi_confirmations: 4
  min_profit_ticks_for_ofi_exit: 28
  # Масштаб нормализации OFI: tanh(raw / ofi_scale).
  # SBER: lot_size=10, очень ликвидный, типичный объём на уровне ~100-500 лотов.
  # При raw OFI ≈ ofi_scale значение tanh ≈ 0.76 (у порога срабатывания).
  ofi_scale: 1000
  # Фильтр тренда: MA по mid-ценам из стакана (в снимках).
  # SBER: ~5-10 снимков/сек → 1000 снимков ≈ 100-200 сек ≈ 2-3 мин тренда.
  # 0 = отключён.
  trend_ma_window: 1000

