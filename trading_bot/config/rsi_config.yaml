SBER:
  length: 10
  smooth: 5
  smo_type_rsi: RMA
  smo_type_signal: EMA
  ob_value: 80.0
  os_value: 20.0
  stop_ticks: 120
  breakeven_ticks: 0
  take_profit_ticks: 240
  trailing_stop_ticks: 0
  max_position_lots: 100
  max_hold_minutes: 150
  cooldown_seconds: 600
  post_close_cooldown_seconds: 900
  trading_hours:
    start: '10:05'
    end: '18:40'
  eod_close_time: '23:30'
  skip_first_minutes: 5
  min_hold_seconds: 300
  atr_days: 5
  atr_length_short: 5
  atr_ratio_min: 0.7
  entry_margin: 10.0
  signal_mode: mean_reversion

